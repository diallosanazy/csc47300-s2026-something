<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sizzle | Add New Item</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="assets/css/add-item.css" />
  </head>
  <body data-page="add-item">
    <div class="layout">
      <!-- Sidebar -->
      <div class="sidebar">
        <a href="index.html" class="link-reset sidebar-brand">
          <div class="sidebar-logo">
            <img src="assets/food-stand.png" alt="Sizzle" width="20" height="20" style="filter:brightness(0) invert(1);" />
          </div>
          <div class="sidebar-title">Sizzle</div>
        </a>
        <nav class="sidebar-nav">
          <a class="link-reset nav-item" href="dashboard.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M3 9L12 2L21 9V20C21 20.53 20.79 21.04 20.41 21.41C20.04 21.79 19.53 22 19 22H5C4.47 22 3.96 21.79 3.59 21.41C3.21 21.04 3 20.53 3 20V9Z" stroke="#6B6963" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span>Dashboard</span>
          </a>
          <a class="link-reset nav-item" href="orders.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M9 5H7C5.9 5 5 5.9 5 7V19C5 20.1 5.9 21 7 21H17C18.1 21 19 20.1 19 19V7C19 5.9 18.1 5 17 5H15" stroke="#6B6963" stroke-width="1.5" stroke-linecap="round" />
              <path d="M9 5C9 3.9 9.9 3 11 3H13C14.1 3 15 3.9 15 5C15 6.1 14.1 7 13 7H11C9.9 7 9 6.1 9 5Z" stroke="#6B6963" stroke-width="1.5" />
            </svg>
            <span>Orders</span>
          </a>
          <a class="link-reset nav-item active" href="menu.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M4 7H20M4 12H20M4 17H12" stroke="#FF6B2C" stroke-width="1.5" stroke-linecap="round" />
            </svg>
            <span>Menu</span>
          </a>
          <a class="link-reset nav-item" href="analytics.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M18 20V10M12 20V4M6 20V14" stroke="#6B6963" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span>Analytics</span>
          </a>
          <a class="link-reset nav-item" href="settings.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="3" stroke="#6B6963" stroke-width="1.5" />
              <path d="M12.22 2H11.78C11.25 2 10.74 2.21 10.37 2.59C9.99 2.96 9.78 3.47 9.78 4V4.18" stroke="#6B6963" stroke-width="1.5" stroke-linecap="round" />
            </svg>
            <span>Settings</span>
          </a>
        </nav>
      </div>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Header -->
        <div class="page-header">
          <div class="header-left">
            <a href="menu.html" class="link-reset back-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="#1C1917" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </a>
            <h1 class="page-title">Add New Item</h1>
          </div>
          <div class="header-actions">
            <a href="menu.html" class="link-reset btn btn-secondary">Cancel</a>
            <button type="submit" form="add-item-form" class="btn btn-primary">Save Item</button>
          </div>
        </div>

        <!-- Form -->
        <form id="add-item-form" class="item-form" novalidate>
          <!-- Row 1: Name + Price -->
          <div class="form-row">
            <div class="form-group flex-2">
              <label class="form-label" for="item-name">Item Name</label>
              <input type="text" id="item-name" class="form-input" placeholder="e.g. Tacos Al Pastor" required />
            </div>
            <div class="form-group w-160">
              <label class="form-label" for="item-price">Price</label>
              <div class="input-with-prefix">
                <span class="input-prefix">$</span>
                <input type="number" id="item-price" class="form-input price-input" placeholder="0.00" min="0" step="0.01" required />
              </div>
            </div>
          </div>

          <!-- Row 2: Category + Availability -->
          <div class="form-row">
            <div class="form-group flex-1">
              <label class="form-label" for="item-category">Category</label>
              <div class="select-wrapper">
                <select id="item-category" class="form-select" required>
                  <option value="" disabled selected>Select category</option>
                  <option value="mains">Mains</option>
                  <option value="sides">Sides</option>
                  <option value="drinks">Drinks</option>
                  <option value="desserts">Desserts</option>
                  <option value="specials">Specials</option>
                </select>
                <svg class="select-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M6 9L12 15L18 9" stroke="#A8A29E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </div>
            </div>
            <div class="form-group flex-1">
              <label class="form-label" for="item-availability">Availability</label>
              <div class="select-wrapper">
                <select id="item-availability" class="form-select">
                  <option value="available" selected>Available</option>
                  <option value="sold-out">Sold Out</option>
                </select>
                <svg class="select-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M6 9L12 15L18 9" stroke="#A8A29E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </div>
            </div>
          </div>

          <!-- Description -->
          <div class="form-group">
            <label class="form-label" for="item-description">Description</label>
            <textarea id="item-description" class="form-textarea" placeholder="Describe the dish, ingredients, and preparation…" rows="3"></textarea>
          </div>

          <!-- Image Upload -->
          <div class="form-group">
            <label class="form-label">Item Photo</label>
            <div class="upload-zone" id="upload-zone">
              <input type="file" id="item-photo" accept="image/png,image/jpeg" hidden />
              <div class="upload-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                  <path d="M21 15V19C21 19.53 20.79 21.04 20.41 21.41C20.04 21.79 19.53 22 19 22H5C4.47 22 3.96 21.79 3.59 21.41C3.21 21.04 3 20.53 3 19V15" stroke="#A8A29E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                  <path d="M17 8L12 3L7 8" stroke="#A8A29E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                  <path d="M12 3V15" stroke="#A8A29E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </div>
              <div class="upload-text">
                <span class="upload-link">Upload a photo</span> or drag and drop
              </div>
              <div class="upload-hint">PNG, JPG up to 5MB</div>
            </div>
            <!-- Preview (hidden by default) -->
            <div class="upload-preview" id="upload-preview" hidden>
              <img id="preview-img" src="" alt="Preview" />
              <button type="button" class="preview-remove" id="preview-remove" title="Remove photo">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </button>
              <div class="preview-name" id="preview-name"></div>
            </div>
          </div>

          <!-- Row 3: Prep Time + Dietary Tags -->
          <div class="form-row">
            <div class="form-group w-200">
              <label class="form-label" for="item-prep-time">Prep Time</label>
              <input type="text" id="item-prep-time" class="form-input" placeholder="e.g. 10 min" />
            </div>
            <div class="form-group flex-1">
              <label class="form-label">Dietary Tags</label>
              <div class="tag-group">
                <label class="tag-chip">
                  <input type="checkbox" name="dietary" value="vegetarian" hidden />
                  <span class="tag-check"></span>
                  <span>Vegetarian</span>
                </label>
                <label class="tag-chip">
                  <input type="checkbox" name="dietary" value="vegan" hidden />
                  <span class="tag-check"></span>
                  <span>Vegan</span>
                </label>
                <label class="tag-chip">
                  <input type="checkbox" name="dietary" value="gluten-free" hidden />
                  <span class="tag-check"></span>
                  <span>Gluten-Free</span>
                </label>
                <label class="tag-chip">
                  <input type="checkbox" name="dietary" value="spicy" hidden />
                  <span class="tag-check"></span>
                  <span>Spicy</span>
                </label>
              </div>
            </div>
          </div>

          <!-- Ingredients -->
          <div class="form-group">
            <label class="form-label" for="item-ingredients">Ingredients</label>
            <input type="text" id="item-ingredients" class="form-input" placeholder="e.g. pork, pineapple, onion, cilantro, corn tortillas" />
          </div>

          <!-- Divider -->
          <div class="form-divider"></div>

          <!-- Toggle: Mark as Popular -->
          <div class="toggle-row">
            <div class="toggle-info">
              <div class="toggle-title">Mark as Popular</div>
              <div class="toggle-desc">Show a "Popular" badge on the vendor page</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="item-popular" />
              <span class="toggle-track"></span>
            </label>
          </div>

          <!-- Toggle: Featured Item -->
          <div class="toggle-row">
            <div class="toggle-info">
              <div class="toggle-title">Featured Item</div>
              <div class="toggle-desc">Highlight this item at the top of your menu</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="item-featured" />
              <span class="toggle-track"></span>
            </label>
          </div>
        </form>
      </main>
    </div>

    <!-- Success Toast -->
    <div class="toast" id="toast" hidden>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M20 6L9 17L4 12" stroke="#2D9F6F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <span id="toast-message">Item saved successfully!</span>
    </div>

    <script src="assets/js/add-item.js"></script>
  </body>
</html>
