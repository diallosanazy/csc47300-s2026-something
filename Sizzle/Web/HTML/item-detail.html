<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sizzle | Item Detail</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="assets/css/item-detail.css" />
  </head>
  <body data-page="item-detail">
    <div class="layout">
      <!-- Sidebar -->
      <div class="sidebar">
        <a href="index.html" class="link-reset sidebar-brand">
          <div class="sidebar-logo">
            <img src="assets/food-stand.png" alt="Sizzle" width="20" height="20" style="filter:brightness(0) invert(1);" />
          </div>
          <div class="sidebar-title">Sizzle</div>
        </a>
        <nav class="sidebar-nav">
          <a class="link-reset nav-item" href="dashboard.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M3 9L12 2L21 9V20C21 20.53 20.79 21.04 20.41 21.41C20.04 21.79 19.53 22 19 22H5C4.47 22 3.96 21.79 3.59 21.41C3.21 21.04 3 20.53 3 20V9Z" stroke="#6B6963" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span>Dashboard</span>
          </a>
          <a class="link-reset nav-item" href="orders.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M9 5H7C5.9 5 5 5.9 5 7V19C5 20.1 5.9 21 7 21H17C18.1 21 19 20.1 19 19V7C19 5.9 18.1 5 17 5H15" stroke="#6B6963" stroke-width="1.5" stroke-linecap="round" />
              <path d="M9 5C9 3.9 9.9 3 11 3H13C14.1 3 15 3.9 15 5C15 6.1 14.1 7 13 7H11C9.9 7 9 6.1 9 5Z" stroke="#6B6963" stroke-width="1.5" />
            </svg>
            <span>Orders</span>
          </a>
          <a class="link-reset nav-item active" href="menu.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M4 7H20M4 12H20M4 17H12" stroke="#FF6B2C" stroke-width="1.5" stroke-linecap="round" />
            </svg>
            <span>Menu</span>
          </a>
          <a class="link-reset nav-item" href="analytics.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M18 20V10M12 20V4M6 20V14" stroke="#6B6963" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span>Analytics</span>
          </a>
          <a class="link-reset nav-item" href="settings.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="3" stroke="#6B6963" stroke-width="1.5" />
              <path d="M12.22 2H11.78C11.25 2 10.74 2.21 10.37 2.59C9.99 2.96 9.78 3.47 9.78 4V4.18" stroke="#6B6963" stroke-width="1.5" stroke-linecap="round" />
            </svg>
            <span>Settings</span>
          </a>
        </nav>
      </div>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Header -->
        <div class="page-header">
          <div class="header-left">
            <a href="menu.html" class="link-reset back-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="#1C1917" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </a>
            <h1 class="page-title" id="detail-name">—</h1>
          </div>
          <div class="header-actions">
            <button class="btn btn-secondary" id="btn-edit">Edit Item</button>
            <button class="btn btn-danger" id="btn-delete">Delete</button>
          </div>
        </div>

        <!-- Two-column content -->
        <div class="detail-content">
          <!-- Left Column -->
          <div class="detail-left">
            <!-- Hero image -->
            <div class="detail-image" id="detail-image">
              <svg width="56" height="56" viewBox="0 0 24 24" fill="none">
                <path d="M2 12C2 12 5 4 12 4C19 4 22 12 22 12" stroke="#D0CFCB" stroke-width="1.5" stroke-linecap="round" />
                <path d="M2 12C2 12 5 20 12 20C19 20 22 12 22 12" stroke="#D0CFCB" stroke-width="1.5" stroke-linecap="round" />
                <circle cx="8" cy="12" r="1" fill="#D0CFCB" />
                <circle cx="12" cy="10" r="1" fill="#D0CFCB" />
                <circle cx="16" cy="12" r="1" fill="#D0CFCB" />
              </svg>
            </div>

            <!-- Description -->
            <div class="detail-section">
              <div class="section-label">Description</div>
              <div class="section-body" id="detail-description">—</div>
            </div>

            <!-- Ingredients -->
            <div class="detail-section">
              <div class="section-label">Ingredients</div>
              <div class="section-body" id="detail-ingredients">—</div>
            </div>

            <!-- Badges -->
            <div class="detail-section">
              <div class="section-label">Badges</div>
              <div class="badge-group" id="detail-badges"></div>
            </div>
          </div>

          <!-- Right Column -->
          <div class="detail-right">
            <!-- Info Card -->
            <div class="info-card">
              <div class="info-row">
                <span class="info-label">Price</span>
                <span class="info-value price" id="detail-price">—</span>
              </div>
              <div class="info-divider"></div>
              <div class="info-row">
                <span class="info-label">Category</span>
                <span class="info-value" id="detail-category">—</span>
              </div>
              <div class="info-divider"></div>
              <div class="info-row">
                <span class="info-label">Availability</span>
                <span class="info-value" id="detail-availability"></span>
              </div>
              <div class="info-divider"></div>
              <div class="info-row">
                <span class="info-label">Prep Time</span>
                <span class="info-value" id="detail-prep-time">—</span>
              </div>
            </div>

            <!-- Tags Card -->
            <div class="info-card">
              <div class="section-label">Dietary Tags</div>
              <div class="tag-group" id="detail-tags">
                <span class="tag-empty">None</span>
              </div>
            </div>

            <!-- Stats Card -->
            <div class="info-card">
              <div class="section-label">Performance</div>
              <div class="stats-grid">
                <div class="stat-cell">
                  <span class="stat-number" id="stat-sold-today">0</span>
                  <span class="stat-label">Sold today</span>
                </div>
                <div class="stat-cell">
                  <span class="stat-number" id="stat-this-week">0</span>
                  <span class="stat-label">This week</span>
                </div>
              </div>
              <div class="stats-grid">
                <div class="stat-cell">
                  <span class="stat-number accent" id="stat-revenue">$0</span>
                  <span class="stat-label">Revenue today</span>
                </div>
                <div class="stat-cell">
                  <span class="stat-number" id="stat-rating">—</span>
                  <span class="stat-label">Avg. rating</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast" hidden>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M20 6L9 17L4 12" stroke="#2D9F6F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <span id="toast-message"></span>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal-overlay" id="delete-modal" hidden>
      <div class="modal">
        <div class="modal-title">Delete Item</div>
        <div class="modal-body">Are you sure you want to delete <strong id="modal-item-name"></strong>? This action cannot be undone.</div>
        <div class="modal-actions">
          <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
          <button class="btn btn-danger" id="modal-confirm">Delete</button>
        </div>
      </div>
    </div>

    <script src="assets/js/item-detail.js"></script>
  </body>
</html>
